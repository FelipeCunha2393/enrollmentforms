<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomorrow Stars</title>

  <link rel="stylesheet" href="styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
  <div id="app">
    <main>
      <div class="main-container">
        <div class="back">
          <img src="assets/icons/arrow-left-02.svg" alt="Arrow left icon">
          <span>Back</span>
        </div>
        <h1>Enrolment Form</h1>
        <p>Please fill out the information below to enroll your child at Tomorrow Stars Preschool.</p>

        <form>
          <fieldset class="child-info">
            <legend>Child Information</legend>
            <div class="input-wrapper">
              <label for="fullname">Full Name</label>
              <input
              name="fullname" 
              id="fullname"
              type="text"
              placeholder="Enter your child's full name">
            </div>

            <div class="input-wrapper">
              <label for="birth">Birth Date</label>
              <input
              name="birth" 
              id="birth"
              type="date">
            </div>

            <div class="select-wrapper">
              <label for="gender">Gender</label>
              <select name="gender" id="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
                <option value="N/A">I rather not to say</option>
              </select>
            </div>

            <div class="textarea-wrapper"> 
              <label for="medical-info">Medical Information</label>
              <textarea name="medical-info" id="medical-info"
                cols=""30 rows="10"
                placeholder="Does the child have any medical condition that the daycare should be aware of?"
                ></textarea>
            </div>

            <div class="droparea-wrapper">
              <input type="file" name="birth-file" id="birth-file">
              <img src="assets/icons/cloud-upload.svg" alt="cloud upload icon">
              <p>Select the files</p>
            </div>
          </fieldset>
        </form>
      </div>
    </main>

    <aside>
      <div class="aside-container">
        <header>
          <img src="assets/logo.svg" alt="Tomorrow Stars Logo">
          <h2>Because every 
            <span>learning</span> 
            moment counts</h2>
          <p>Enroll your child in our school and watch them thrive in a warm, safe, and stimulating environment.</p>
        </header>
        <img src="assets/Illustration.svg" alt="Illustration of a child playing with blocks">
      </div>
    </aside>
  </div>
  
</body>
</html>
